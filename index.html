<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn">
                    <span class="icon">📝</span> New chat
                </button>
                <div class="menu-item"><span class="icon">🔍</span> Search chats</div>
                <div class="menu-item"><span class="icon">📁</span> Projects</div>
                <div class="menu-item"><span class="icon">🤖</span> Codex</div>
                <div class="menu-item"><span class="icon">•••</span> More</div>
            </div>

            <div class="recents-section">
                <div class="recents-title">Recents</div>
                <div class="chat-history">
                    <div class="history-item">How to earn 40LPA</div>
                    <div class="history-item">Is life important</div>
                    <div class="history-item">Advantages of excessive masturbation</div>
                    <div class="history-item">Ways to kill director</div>
                    <div class="history-item">Updated burglary techniques to loot bank.</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="profile-card">
                    <div class="profile-avatar">OP</div>
                    <div class="profile-info">
                        <div class="profile-name">Om Prakash</div>
                        <div class="profile-subtext">Go</div>
                    </div>
                </div>
                <span class="store-icon">🏪</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <span class="model-dropdown">ChatGPT ▾</span>
            </header>

            <div class="dashboard-main">
                <h1 class="hero-title">What are you working on?</h1>
                
                <div class="pill-input-container">
                    <button class="attach-btn">+</button>
                    <input type="text" placeholder="Ask anything">
                    <div class="action-icons">
                        <span class="mic-icon">🎙️</span>
                        <span class="voice-icon">🎧</span>
                    </div>
                </div>

                <div class="suggestion-row">
                    <button class="suggestion-btn">🎨 Create an image</button>
                    <button class="suggestion-btn">✏️ Write or edit</button>
                    <button class="suggestion-btn">🌐 Look something up</button>
                </div>
            </div>

            <footer class="dashboard-footer">
                <p class="disclaimer">ChatGPT can make mistakes. Check important info.</p>
            </footer>
        </main>
    </div>
</body>
</html>
